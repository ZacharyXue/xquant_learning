# xtquant 量化交易系统 主配置
#
# 敏感信息 (qmt_path, account_id) 不写在此文件中，
# 请通过环境变量 XTQUANT_QMT_PATH / XTQUANT_ACCOUNT_ID 设置

app:
  host: 0.0.0.0
  port: 8000

database:
  host: 127.0.0.1
  port: 5432
  user: postgres
  password: postgres
  db: xtquant

grpc:
  host: localhost
  port: 50051

trade:
  qmt_path: "D:\\国金证券QMT交易端\\userdata_mini"
  account_id: "8884731549"
  mode: real                  # real | sim
  max_position_per_stock: 10000
  initial_capital: 100000.0
  sim_initial_capital: 100000.0

fee:
  commission_rate: 0.00025    # 佣金 万2.5
  stamp_tax_rate: 0.001       # 印花税 千1
  transfer_fee_rate: 0.00002  # 过户费 万0.2
  min_commission: 5.0         # 最低佣金 5元

slippage:
  rate: 0.001                 # 滑点千1
  mode: fixed_rate            # fixed_rate | spread_based

trading_hours:
  start: "09:30"
  end: "14:55"
  cancel_unfilled_at: "14:50"
