syntax = "proto3";

package trade;

// 交易服务定义
service TradeService {
  // 买入股票
  rpc BuyStock (BuyRequest) returns (TradeResponse);
  
  // 卖出股票
  rpc SellStock (SellRequest) returns (TradeResponse);

  // 撤销股票订单
  rpc CancelStock (CancelRequest) returns (TradeResponse);
  
  // 测试连接
  rpc TestConnection (TestRequest) returns (TestResponse);
  
  // 关闭服务
  rpc Shutdown (ShutdownRequest) returns (ShutdownResponse);
}

// 买入请求
message BuyRequest {
  string stock_code = 1;
  int32 volume = 2;
  double price = 3;
}

// 卖出请求
message SellRequest {
  string stock_code = 1;
  int32 volume = 2;
  double price = 3;
}

// 撤单请求
message CancelRequest {
  int64 order_id = 1;
}

// 交易响应
// async_seq: 请求序列号
message TradeResponse {
  bool success = 1;
  string error = 2;
  int64 async_seq = 3;
}

// 测试连接请求
message TestRequest {
  string message = 1;
  int64 timestamp = 2;
}

// 测试连接响应
message TestResponse {
  string status = 1;
  string message = 2;
  int64 timestamp = 3;
}

// 关闭请求
message ShutdownRequest {
}

// 关闭响应
message ShutdownResponse {
  bool success = 1;
  string message = 2;
}