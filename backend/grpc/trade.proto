syntax = "proto3";

package xtquant;

// ============================================================
// 量化交易系统 gRPC 协议
//
// 策略引擎 (客户端) ←→ 交易引擎 (服务端)
// 策略引擎不感知底层是真实交易还是模拟交易
// ============================================================

service TradeService {
    // 下单
    rpc PlaceOrder(OrderRequest) returns (OrderResponse);

    // 撤单
    rpc CancelOrder(CancelRequest) returns (CancelResponse);

    // 查询账户
    rpc GetAccount(AccountRequest) returns (AccountResponse);

    // 查询持仓
    rpc GetPositions(PositionsRequest) returns (PositionsResponse);

    // 查询委托
    rpc GetOrders(OrdersRequest) returns (OrdersResponse);

    // 查询今日成交
    rpc GetTrades(TradesRequest) returns (TradesResponse);

    // 订阅实时行情 (server streaming)
    rpc SubscribeMarketData(MarketDataRequest) returns (stream MarketDataTick);

    // 查询历史K线
    rpc GetHistoryKline(KlineRequest) returns (KlineResponse);

    // 获取可用股票列表
    rpc GetStockList(StockListRequest) returns (StockListResponse);

    // 心跳
    rpc Ping(PingRequest) returns (PingResponse);

    // 查询交易模式 (real/sim)
    rpc GetTradeMode(TradeModeRequest) returns (TradeModeResponse);
}

// ============================================================
// 订单
// ============================================================

message OrderRequest {
    string stock_code = 1;       // 股票代码 e.g. "000001.SZ"
    int32 volume = 2;            // 数量 (股)
    double price = 3;            // 价格，0 = 市价
    string side = 4;             // "buy" / "sell"
    string order_type = 5;       // "limit" / "market"
    string strategy_name = 6;    // 策略名称
    string order_remark = 7;     // 订单备注
}

message OrderResponse {
    bool success = 1;
    string order_id = 2;         // xtquant 返回的订单ID/异步序号
    string error = 3;            // 错误信息
    double estimated_fee = 4;    // 预估费用 (含佣金+印花税+过户费)
    double slippage_price = 5;   // 含滑点的预期成交价
    double order_price = 6;      // 原始下单价格
    int32 order_volume = 7;      // 下单数量
    string status = 8;           // 订单状态
}

// ============================================================
// 撤单
// ============================================================

message CancelRequest {
    string order_id = 1;
    string stock_code = 2;       // 可选，按股票撤所有
}

message CancelResponse {
    bool success = 1;
    string error = 2;
    int32 canceled_count = 3;
}

// ============================================================
// 账户
// ============================================================

message AccountRequest {
    string trade_mode = 1;       // "real" / "sim"
}

message AccountResponse {
    bool success = 1;
    string account_id = 2;
    double total_asset = 3;      // 总资产
    double available_cash = 4;   // 可用资金
    double frozen_cash = 5;      // 冻结资金
    double market_value = 6;     // 持仓市值
    double total_profit_loss = 7;// 累计盈亏
    double today_profit_loss = 8;// 当日盈亏
    string trade_mode = 9;       // "real" / "sim"
}

// ============================================================
// 持仓
// ============================================================

message Position {
    string stock_code = 1;
    string stock_name = 2;
    int32 volume = 3;            // 持仓数量
    int32 available_volume = 4;  // 可用数量
    double avg_cost = 5;         // 成本价
    double current_price = 6;    // 现价
    double market_value = 7;     // 市值
    double profit_loss = 8;      // 浮动盈亏
    double profit_loss_ratio = 9;// 盈亏比例
    string trade_mode = 10;
}

message PositionsRequest {
    string trade_mode = 1;
}

message PositionsResponse {
    bool success = 1;
    repeated Position positions = 2;
    string error = 3;
}

// ============================================================
// 委托
// ============================================================

message Order {
    string order_id = 1;
    string stock_code = 2;
    string stock_name = 3;
    string side = 4;             // "buy" / "sell"
    int32 order_volume = 5;      // 委托数量
    int32 traded_volume = 6;     // 已成交数量
    double order_price = 7;      // 委托价格
    double traded_price = 8;     // 成交均价
    string status = 9;           // pending/filled/partial/cancelled/rejected
    string strategy_name = 10;
    string order_remark = 11;
    string order_time = 12;      // ISO 8601
}

message OrdersRequest {
    string status = 1;           // 为空则查所有
    string trade_mode = 2;
}

message OrdersResponse {
    bool success = 1;
    repeated Order orders = 2;
    string error = 3;
}

// ============================================================
// 成交
// ============================================================

message Trade {
    string trade_id = 1;
    string order_id = 2;
    string stock_code = 3;
    string stock_name = 4;
    string side = 5;
    int32 trade_volume = 6;
    double trade_price = 7;
    double trade_amount = 8;     // 成交金额
    double commission = 9;       // 佣金
    double stamp_tax = 10;       // 印花税
    double transfer_fee = 11;    // 过户费
    string trade_time = 12;      // ISO 8601
}

message TradesRequest {
    string trade_mode = 1;
}

message TradesResponse {
    bool success = 1;
    repeated Trade trades = 2;
    string error = 3;
}

// ============================================================
// 实时行情 (streaming)
// ============================================================

message MarketDataRequest {
    repeated string stock_codes = 1;  // 订阅的股票代码列表
    string trade_mode = 2;
}

message MarketDataTick {
    string stock_code = 1;
    string stock_name = 2;
    double last_price = 3;       // 最新价
    double open = 4;             // 开盘价
    double high = 5;             // 最高价
    double low = 6;              // 最低价
    double last_close = 7;       // 昨收
    double volume = 8;           // 成交量
    double amount = 9;           // 成交额
    double bid_price_1 = 10;     // 买一价
    double ask_price_1 = 11;     // 卖一价
    int32 bid_volume_1 = 12;     // 买一量
    int32 ask_volume_1 = 13;     // 卖一量
    string time = 14;            // 行情时间 HHMMSSmmm
    string trade_mode = 15;
}

// ============================================================
// 历史K线
// ============================================================

message KlineRequest {
    string stock_code = 1;
    string period = 2;           // "1d" / "1m" / "5m" / "60m"
    string start_time = 3;       // YYYYMMDD 或 YYYYMMDDHHMMSS
    string end_time = 4;
    repeated string fields = 5;  // close/open/high/low/volume
}

message KlineResponse {
    bool success = 1;
    repeated string time = 2;
    repeated double close = 3;
    repeated double open = 4;
    repeated double high = 5;
    repeated double low = 6;
    repeated double volume = 7;
    string error = 8;
}

// ============================================================
// 股票列表
// ============================================================

message StockListRequest {
    string market = 1;           // "SH" / "SZ" / "" = 全部
}

message StockInfo {
    string stock_code = 1;
    string stock_name = 2;
    string market = 3;
}

message StockListResponse {
    bool success = 1;
    repeated StockInfo stocks = 2;
    string error = 3;
}

// ============================================================
// 心跳 & 交易模式
// ============================================================

message PingRequest {}

message PingResponse {
    bool ok = 1;
    string server_time = 2;
    string trade_mode = 3;
}

message TradeModeRequest {}

message TradeModeResponse {
    string mode = 1;             // "real" / "sim"
    string server_platform = 2;  // "win32" / "linux" / "darwin"
}
